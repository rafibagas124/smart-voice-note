<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Voice Note AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --bg: #F8FAFC; --card: #FFFFFF; --border: #E2E8F0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 800px; width: 100%; background: var(--card); padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        h2 { text-align: center; margin-bottom: 20px; color: #1E293B; }
        textarea { width: 100%; height: 200px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); font-size: 16px; margin-bottom: 15px; resize: none; background: #F8FAFC; box-sizing: border-box; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; font-size: 14px; flex: 1; min-width: 130px; }
        .btn-record { background: #EF4444; }
        .btn-copy { background: #8B5CF6; }
        .btn-ai { background: #38BDF8; }
        .result-box { background: #F0F9FF; padding: 15px; border-radius: 12px; border: 1px solid #BAE6FD; color: #0369A1; display: none; margin-top: 10px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎙️ Smart Voice Note</h2>
        <div class="btn-group">
            <button class="btn btn-record" onclick="toggleRecord()" id="btnRec">🔴 Mulai Rekam</button>
            <button class="btn btn-copy" onclick="copyTxt()">📋 Salin Teks</button>
        </div>
        <textarea id="note" placeholder="Klik 'Mulai Rekam' dan bicaralah..."></textarea>
        <div class="btn-group">
            <button class="btn btn-ai" onclick="proses('ringkas')">✨ Ringkas</button>
            <button class="btn btn-ai" onclick="proses('poin')">📌 Poin Penting</button>
        </div>
        <div id="result" class="result-box"></div>
    </div>
    <script>
        let rec; let isRec = false;
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            rec = new Speech(); rec.continuous = true; rec.lang = 'id-ID'; rec.interimResults = true;
            rec.onresult = (e) => {
                let txt = ''; for(let i=e.resultIndex; i<e.results.length; i++) { if(e.results[i].isFinal) txt += e.results[i][0].transcript + ' '; }
                document.getElementById('note').value += txt;
            };
        }
        function toggleRecord() {
            if(!isRec) { rec.start(); isRec = true; document.getElementById('btnRec').innerText = "⏹️ Berhenti"; }
            else { rec.stop(); isRec = false; document.getElementById('btnRec').innerText = "🔴 Mulai Rekam"; }
        }
        function copyTxt() {
            const t = document.getElementById('note'); t.select(); navigator.clipboard.writeText(t.value);
            alert("Teks disalin!");
        }
        function proses(tipe) {
            const t = document.getElementById('note').value; if(!t.trim()) return alert("Teks masih kosong!");
            const res = document.getElementById('result'); res.style.display = 'block';
            const kalimat = t.split('.').filter(s => s.trim().length > 0);
            if(tipe === 'ringkas') res.innerHTML = "<b>Hasil Ringkasan:</b><br>" + (kalimat[0] || t) + ".";
            else res.innerHTML = "<b>Poin Penting:</b><br>• " + kalimat.join('<br>• ');
        }
    </script>
</body>
</html>
