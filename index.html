<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Voice Note Ultra - V3.0</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlNtYXJ0IFZvaWNlIE5vdGUiLAogICJzaG9ydF9uYW1lIjogIlZvaWNlTm90ZSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjNGY0NmU1IiwKICAidGhlbWVfY29sb3IiOiAiIzRmNDZlNSIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi83MDkvNzA5OTU3LnBuZyIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9XQp9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4F46E5; --bg: #F1F5F9; --card: #FFFFFF; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 15px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; background: var(--card); padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 15px; }
        .timer { text-align: center; color: #EF4444; font-weight: bold; font-size: 20px; display: none; margin: 10px 0; }
        textarea { width: 100%; height: 200px; padding: 15px; border-radius: 12px; border: 1px solid #E2E8F0; font-size: 16px; margin-bottom: 10px; resize: none; background: #F8FAFC; box-sizing: border-box; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: white; flex: 1; min-width: 120px; font-size: 13px; }
        .search-box { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #E2E8F0; margin-bottom: 15px; }
        .note-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #E2E8F0; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .footer { margin-top: 20px; text-align: center; font-size: 11px; color: #64748B; border-top: 1px solid #E2E8F0; padding-top: 10px; }
        .active { background: var(--primary) !important; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ Smart Voice Note Ultra</h1>
            <p style="font-size: 12px; color: gray;">V3.0 | AI Command & Diarization Enabled</p>
        </div>

        <div id="timerDisplay" class="timer">00:00</div>

        <div class="btn-group">
            <button class="btn" style="background: #EF4444;" id="btnRec" onclick="toggleRecord()">🔴 Mulai Rekam</button>
            <button class="btn" style="background: #2563EB;" onclick="saveToWeb()">💾 Simpan ke Web</button>
        </div>

        <textarea id="note" placeholder="Bicara... (Coba bilang 'Simpan Catatan' untuk auto-save)"></textarea>

        <input type="text" class="search-box" id="search" placeholder="🔍 Cari catatan lama..." onkeyup="renderNotes()">

        <div id="storageList"></div>

        <div class="footer">
            Built by <b>Rafi Bagas</b> • <a href="https://wa.me/6288297172672">Bug: +6288297172672</a>
        </div>
    </div>

    <script>
        let rec; let isRec = false; let forcedStop = false;
        let lastSpeakerTime = Date.now();
        let speakerTag = "Speaker A";

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(Speech) {
            rec = new Speech(); rec.continuous = true; rec.interimResults = true;
            
            rec.onresult = (e) => {
                let finalTxt = '';
                for(let i = e.resultIndex; i < e.results.length; i++) {
                    if(e.results[i].isFinal) {
                        let text = e.results[i][0].transcript.toLowerCase();
                        
                        // --- AI VOICE COMMAND ---
                        if(text.includes("simpan catatan")) return saveToWeb();
                        if(text.includes("hapus semua")) return clearAll();
                        
                        // --- DIARIZATION HACK ---
                        let now = Date.now();
                        if(now - lastSpeakerTime > 3000) { // Jika jeda > 3 detik, ganti speaker
                            speakerTag = (speakerTag === "Speaker A") ? "Speaker B" : "Speaker A";
                            finalTxt += `\n[${speakerTag}]: `;
                        }
                        lastSpeakerTime = now;
                        finalTxt += e.results[i][0].transcript;
                    }
                }
                document.getElementById('note').value += finalTxt;
            };
            rec.onend = () => { if(isRec && !forcedStop) rec.start(); };
        }

        function toggleRecord() {
            const b = document.getElementById('btnRec');
            const t = document.getElementById('timerDisplay');
            if(!isRec) {
                isRec = true; forcedStop = false; rec.start();
                b.innerText = "⏹️ Stop"; t.style.display = 'block';
            } else {
                isRec = false; forcedStop = true; rec.stop();
                b.innerText = "🔴 Mulai Rekam"; t.style.display = 'none';
            }
        }

        function saveToWeb() {
            const content = document.getElementById('note').value;
            if(!content.trim()) return;
            const notes = JSON.parse(localStorage.getItem('v3Notes') || '[]');
            notes.unshift({ id: Date.now(), text: content, date: new Date().toLocaleString() });
            localStorage.setItem('v3Notes', JSON.stringify(notes));
            document.getElementById('note').value = "";
            renderNotes();
            alert("✅ Disimpan otomatis lewat Voice Command!");
        }

        function renderNotes() {
            const query = document.getElementById('search').value.toLowerCase();
            const notes = JSON.parse(localStorage.getItem('v3Notes') || '[]');
            const list = document.getElementById('storageList');
            list.innerHTML = "";
            
            notes.filter(n => n.text.toLowerCase().includes(query)).forEach(n => {
                const div = document.createElement('div');
                div.className = 'note-card';
                div.innerHTML = `<div><b>${n.text.substring(0,40)}...</b><br><small>${n.date}</small></div>
                                 <button onclick="deleteNote(${n.id})" style="color:red; background:none; border:none; cursor:pointer;">Hapus</button>`;
                list.appendChild(div);
            });
        }

        function deleteNote(id) {
            let notes = JSON.parse(localStorage.getItem('v3Notes')).filter(x => x.id !== id);
            localStorage.setItem('v3Notes', JSON.stringify(notes));
            renderNotes();
        }

        function clearAll() { if(confirm("Hapus semua?")) { localStorage.removeItem('v3Notes'); renderNotes(); } }

        // --- PWA SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi.mFkZEV2ZW50TGlzdGVuZXIoJ2ZldGNoJywgZXZlbnQgPT4ge30pOw==');
        }

        renderNotes();
    </script>
</body>
</html>
